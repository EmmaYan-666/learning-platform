<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>汉字游戏测试</title>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        h1 {
            color: #667eea;
            margin-bottom: 20px;
        }
        .main-character {
            font-size: 150px;
            font-family: 'KaiTi', 'SimKai', serif;
            color: #333;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .main-character:hover {
            transform: scale(1.05);
            color: #667eea;
        }
        .pinyin {
            font-size: 32px;
            color: #666;
            text-align: center;
            margin-bottom: 10px;
        }
        .stroke-container {
            width: 200px;
            height: 200px;
            border: 3px solid #f093fb;
            border-radius: 15px;
            margin: 20px auto;
        }
        button {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
            display: block;
            margin: 20px auto;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(240, 147, 251, 0.3);
        }
        #status {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>汉字游戏测试页面</h1>
        
        <div class="pinyin" id="pinyin">rén</div>
        <div class="main-character" id="char" onclick="speak()">人</div>
        
        <div class="stroke-container" id="strokeContainer"></div>
        
        <button onclick="animateStroke()">✍️ 观看笔画顺序</button>
        <button onclick="nextChar()">下一题</button>
        
        <div id="status">状态：就绪</div>
    </div>

    <script>
        const testData = [
            { char: "人", pinyin: "rén" },
            { char: "口", pinyin: "kǒu" },
            { char: "大", pinyin: "dà" }
        ];
        
        let currentIndex = 0;
        let writer = null;
        
        function log(message) {
            document.getElementById('status').textContent = '状态：' + message;
            console.log(message);
        }
        
        function initStroke(char) {
            log('初始化笔画动画: ' + char);
            try {
                const container = document.getElementById('strokeContainer');
                container.innerHTML = '';
                
                writer = HanziWriter.create('strokeContainer', char, {
                    width: 200,
                    height: 200,
                    padding: 5,
                    strokeColor: '#f093fb',
                    radicalColor: '#f5576c',
                    strokeAnimationSpeed: 1,
                    delayBetweenStrokes: 300,
                    showOutline: true,
                    showCharacter: false,
                    outlineColor: '#e0e0e0',
                    drawingColor: '#667eea',
                    onLoadCharDataSuccess: function(data) {
                        log('笔画数据加载成功: ' + char);
                    },
                    onLoadCharDataError: function(reason) {
                        log('笔画数据加载失败: ' + reason);
                    }
                });
            } catch (error) {
                log('错误: ' + error.message);
                console.error(error);
            }
        }
        
        function animateStroke() {
            if (writer) {
                log('播放笔画动画');
                writer.animateCharacter();
            } else {
                log('笔画动画未初始化');
            }
        }
        
        function speak() {
            const char = document.getElementById('char').textContent;
            log('发音: ' + char);
            
            const utterance = new SpeechSynthesisUtterance(char);
            utterance.lang = 'zh-CN';
            utterance.rate = 0.8;
            speechSynthesis.speak(utterance);
        }
        
        function nextChar() {
            currentIndex = (currentIndex + 1) % testData.length;
            const data = testData[currentIndex];
            
            document.getElementById('char').textContent = data.char;
            document.getElementById('pinyin').textContent = data.pinyin;
            
            log('切换到: ' + data.char);
            initStroke(data.char);
        }
        
        // 初始化
        log('页面加载完成');
        initStroke('人');
    </script>
</body>
</html>
