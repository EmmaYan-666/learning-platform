<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语单词学习游戏 🎮</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* 顶部信息栏 */
        .header {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .score-board {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .score-item {
            text-align: center;
            padding: 10px 20px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 15px;
            color: white;
            font-weight: bold;
        }

        .score-item .number {
            font-size: 32px;
            display: block;
        }

        .score-item .label {
            font-size: 14px;
        }

        .stars {
            font-size: 32px;
            animation: sparkle 0.5s ease-in-out infinite alternate;
        }

        @keyframes sparkle {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        /* 类别选择 */
        .category-selector {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        .category-selector h3 {
            margin-bottom: 15px;
            color: #333;
            font-size: 20px;
        }

        .category-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .category-btn {
            padding: 12px 24px;
            border: 3px solid #667eea;
            background: white;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            color: #667eea;
        }

        .category-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .category-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        /* 游戏区域 */
        .game-area {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .word-display {
            text-align: center;
            margin-bottom: 30px;
        }

        .current-word {
            font-size: 48px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .current-word:hover {
            transform: scale(1.05);
            color: #667eea;
        }

        .hint-text {
            color: #888;
            font-size: 14px;
            font-style: italic;
        }

        /* 图片选择区域 */
        .choices-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .choice-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border: 4px solid #e0e0e0;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .choice-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            border-color: #667eea;
        }

        .choice-card.selected {
            transform: scale(0.95);
            border-color: #f093fb;
        }

        .choice-card.correct {
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
            border-color: #4CAF50;
            animation: correctPulse 0.6s ease;
        }

        .choice-card.wrong {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            border-color: #f44336;
            animation: wrongShake 0.5s ease;
        }

        @keyframes correctPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes wrongShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .choice-emoji {
            font-size: 100px;
            line-height: 1.2;
            margin: 10px 0;
            transition: transform 0.3s ease;
        }

        .choice-card:hover .choice-emoji {
            transform: scale(1.1);
        }

        .choice-text {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-top: 10px;
        }

        /* 反馈消息 */
        .feedback-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px 50px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
            z-index: 1000;
            animation: feedbackPop 0.3s ease;
            display: none;
        }

        .feedback-message.show {
            display: block;
        }

        @keyframes feedbackPop {
            from { transform: translate(-50%, -50%) scale(0); }
            to { transform: translate(-50%, -50%) scale(1); }
        }

        .feedback-emoji {
            font-size: 80px;
            display: block;
            margin-bottom: 15px;
        }

        .feedback-text {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        /* 按钮 */
        .btn {
            padding: 15px 40px;
            font-size: 20px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            margin: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-success {
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
            color: #333;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .btn:active {
            transform: translateY(0);
        }

        .button-container {
            text-align: center;
            margin-top: 20px;
        }

        /* 音频控制 */
        .audio-control {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .volume-slider {
            width: 100px;
        }

        /* 进度条 */
        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 20px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.5s ease;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                text-align: center;
            }

            .score-board {
                width: 100%;
                justify-content: center;
            }

            .choice-emoji {
                font-size: 70px;
            }

            .current-word {
                font-size: 36px;
            }
        }

        /* 加载动画 */
        .loading {
            text-align: center;
            padding: 50px;
        }

        .loading-spinner {
            font-size: 60px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 遮罩层 */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
            display: none;
        }

        .overlay.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 顶部信息栏 -->
        <div class="header">
            <div class="score-board">
                <div class="score-item">
                    <span class="number" id="score">0</span>
                    <span class="label">得分</span>
                </div>
                <div class="score-item">
                    <span class="number" id="streak">0</span>
                    <span class="label">连胜</span>
                </div>
                <div class="stars" id="stars"></div>
            </div>
            <div class="audio-control">
                <label>🔊 音量:</label>
                <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.1" value="0.8">
            </div>
        </div>

        <!-- 类别选择 -->
        <div class="category-selector">
            <h3>📚 选择学习类别</h3>
            <div class="category-buttons" id="categoryButtons">
                <!-- 动态生成 -->
            </div>
        </div>

        <!-- 游戏区域 -->
        <div class="game-area" id="gameArea">
            <div class="word-display">
                <div class="current-word" id="currentWord" onclick="speakWord()">
                    点击开始
                </div>
                <div class="hint-text">👆 点击单词可以听发音</div>
            </div>
            <div class="choices-grid" id="choicesGrid">
                <div class="loading">
                    <div class="loading-spinner">⏳</div>
                    <p>准备中...</p>
                </div>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
            <div class="button-container">
                <button class="btn btn-primary" onclick="startNewRound()" id="nextBtn">
                    下一题 ➡️
                </button>
                <button class="btn btn-success" onclick="resetGame()">
                    重新开始 🔄
                </button>
            </div>
        </div>
    </div>

    <!-- 反馈消息 -->
    <div class="overlay" id="overlay"></div>
    <div class="feedback-message" id="feedbackMessage">
        <div class="feedback-emoji" id="feedbackEmoji"></div>
        <div class="feedback-text" id="feedbackText"></div>
    </div>

    <script>
        // 单词数据
        const wordDatabase = {
            "animals": [
                { word: "Dog", emoji: "🐕", chinese: "小狗" },
                { word: "Cat", emoji: "🐱", chinese: "小猫" },
                { word: "Mouse", emoji: "🐭", chinese: "老鼠" },
                { word: "Lion", emoji: "🦁", chinese: "狮子" },
                { word: "Leopard", emoji: "🐆", chinese: "豹子" },
                { word: "Elephant", emoji: "🐘", chinese: "大象" },
                { word: "Bird", emoji: "🐦", chinese: "小鸟" },
                { word: "Fish", emoji: "🐟", chinese: "鱼" },
                { word: "Monkey", emoji: "🐒", chinese: "猴子" }
            ],
            "food": [
                { word: "Apple", emoji: "🍎", chinese: "苹果" },
                { word: "Cheese", emoji: "🧀", chinese: "奶酪" },
                { word: "Bread", emoji: "🍞", chinese: "面包" },
                { word: "Lollipop", emoji: "🍭", chinese: "棒棒糖" },
                { word: "Milk", emoji: "🥛", chinese: "牛奶" },
                { word: "Yogurt", emoji: "🥄", chinese: "酸奶" },
                { word: "Donut", emoji: "🍩", chinese: "甜甜圈" },
                { word: "Banana", emoji: "🍌", chinese: "香蕉" },
                { word: "Cake", emoji: "🎂", chinese: "蛋糕" },
                { word: "Watermelon", emoji: "🍉", chinese: "西瓜" },
                { word: "Water", emoji: "💧", chinese: "水" },
                { word: "Rice", emoji: "🍚", chinese: "米饭" }
            ],
            "family": [
                { word: "Mom", emoji: "👩", chinese: "妈妈" },
                { word: "Dad", emoji: "👨", chinese: "爸爸" },
                { word: "Grandpa", emoji: "👴", chinese: "爷爷" },
                { word: "Grandma", emoji: "👵", chinese: "奶奶" },
                { word: "Baby", emoji: "👶", chinese: "宝宝" }
            ],
            "colors": [
                { word: "Red", emoji: "🔴", chinese: "红色" },
                { word: "Green", emoji: "🟢", chinese: "绿色" },
                { word: "Blue", emoji: "🔵", chinese: "蓝色" },
                { word: "White", emoji: "⚪", chinese: "白色" },
                { word: "Black", emoji: "⚫", chinese: "黑色" },
                { word: "Brown", emoji: "🟤", chinese: "棕色" },
                { word: "Yellow", emoji: "🟡", chinese: "黄色" },
                { word: "Purple", emoji: "🟣", chinese: "紫色" }
            ],
            "body": [
                { word: "Ear", emoji: "👂", chinese: "耳朵" },
                { word: "Eye", emoji: "👁️", chinese: "眼睛" },
                { word: "Head", emoji: "🗣️", chinese: "头" },
                { word: "Hand", emoji: "✋", chinese: "手" },
                { word: "Leg", emoji: "🦵", chinese: "腿" },
                { word: "Shoulder", emoji: "💪", chinese: "肩膀" },
                { word: "Nose", emoji: "👃", chinese: "鼻子" },
                { word: "Mouth", emoji: "👄", chinese: "嘴巴" },
                { word: "Arm", emoji: "💪", chinese: "手臂" },
                { word: "Foot", emoji: "🦶", chinese: "脚" },
                { word: "Finger", emoji: "👆", chinese: "手指" },
                { word: "Knee", emoji: "🦵", chinese: "膝盖" },
                { word: "Hair", emoji: "💇", chinese: "头发" },
                { word: "Face", emoji: "😊", chinese: "脸" },
                { word: "Neck", emoji: "🗣️", chinese: "脖子" }
            ],
            "adjectives": [
                { word: "Big", emoji: "🐘", chinese: "大的" },
                { word: "Small", emoji: "🐭", chinese: "小的" },
                { word: "Tall", emoji: "🦒", chinese: "高的" },
                { word: "Short", emoji: "🧸", chinese: "矮的" }
            ]
        };

        // 游戏状态
        let gameState = {
            score: 0,
            streak: 0,
            totalQuestions: 0,
            currentWord: null,
            selectedCategories: ['animals', 'food'],
            volume: 0.8,
            isPlaying: false
        };

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            initCategoryButtons();
            loadGameState();
            startNewRound();
            
            // 音量控制
            document.getElementById('volumeSlider').addEventListener('input', (e) => {
                gameState.volume = parseFloat(e.target.value);
                saveGameState();
            });
        });

        // 初始化类别按钮
        function initCategoryButtons() {
            const container = document.getElementById('categoryButtons');
            const categories = {
                'animals': '🐾 动物',
                'food': '🍔 食物',
                'family': '👨‍👩‍👧‍👦 家庭',
                'colors': '🎨 颜色',
                'body': '👂 身体',
                'adjectives': '📏 形容词'
            };

            container.innerHTML = '';
            for (let [key, label] of Object.entries(categories)) {
                const btn = document.createElement('button');
                btn.className = 'category-btn' + (gameState.selectedCategories.includes(key) ? ' active' : '');
                btn.textContent = label;
                btn.onclick = () => toggleCategory(key, btn);
                container.appendChild(btn);
            }
        }

        // 切换类别
        function toggleCategory(category, btn) {
            const index = gameState.selectedCategories.indexOf(category);
            if (index > -1) {
                if (gameState.selectedCategories.length > 1) {
                    gameState.selectedCategories.splice(index, 1);
                    btn.classList.remove('active');
                }
            } else {
                gameState.selectedCategories.push(category);
                btn.classList.add('active');
            }
            saveGameState();
            startNewRound();
        }

        // 获取随机单词
        function getRandomWords() {
            let allWords = [];
            gameState.selectedCategories.forEach(category => {
                allWords = allWords.concat(wordDatabase[category]);
            });
            
            // 打乱顺序
            for (let i = allWords.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [allWords[i], allWords[j]] = [allWords[j], allWords[i]];
            }
            
            return allWords;
        }

        // 开始新一轮
        function startNewRound() {
            const words = getRandomWords();
            gameState.currentWord = words[0];
            
            // 选择4个选项
            const choices = [words[0]];
            const otherWords = words.slice(1);
            for (let i = 0; i < 3 && i < otherWords.length; i++) {
                const randomIndex = Math.floor(Math.random() * otherWords.length);
                choices.push(otherWords[randomIndex]);
                otherWords.splice(randomIndex, 1);
            }
            
            // 打乱选项顺序
            for (let i = choices.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [choices[i], choices[j]] = [choices[j], choices[i]];
            }
            
            // 显示单词
            document.getElementById('currentWord').textContent = gameState.currentWord.word;
            
            // 显示选项
            const grid = document.getElementById('choicesGrid');
            grid.innerHTML = '';
            
            choices.forEach(choice => {
                const card = document.createElement('div');
                card.className = 'choice-card';
                card.onclick = () => selectChoice(card, choice);
                card.innerHTML = `
                    <div class="choice-emoji">${choice.emoji}</div>
                    <div class="choice-text">${choice.word}</div>
                `;
                grid.appendChild(card);
            });
            
            // 更新进度条
            const progress = (gameState.totalQuestions / 10) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            
            // 自动朗读单词
            setTimeout(() => speakWord(), 500);
            
            saveGameState();
        }

        // 选择答案
        function selectChoice(card, choice) {
            if (gameState.isPlaying) return;
            gameState.isPlaying = true;
            
            // 禁用所有卡片
            const allCards = document.querySelectorAll('.choice-card');
            allCards.forEach(c => c.onclick = null);
            
            // 检查答案
            const isCorrect = choice.word === gameState.currentWord.word;
            
            if (isCorrect) {
                card.classList.add('correct');
                gameState.score += 10;
                gameState.streak++;
                gameState.totalQuestions++;
                
                // 播放成功音效
                playSound('success');
                showFeedback(true);
            } else {
                card.classList.add('wrong');
                gameState.streak = 0;
                
                // 显示正确答案
                allCards.forEach(c => {
                    if (c.querySelector('.choice-text').textContent === gameState.currentWord.word) {
                        c.classList.add('correct');
                    }
                });
                
                // 播放失败音效
                playSound('error');
                showFeedback(false);
            }
            
            // 更新分数显示
            updateScoreDisplay();
            
            // 延迟后开始下一轮
            setTimeout(() => {
                gameState.isPlaying = false;
                startNewRound();
            }, 2000);
        }

        // 显示反馈
        function showFeedback(isCorrect) {
            const messages = isCorrect ? [
                { emoji: '🎉', text: '太棒了！' },
                { emoji: '⭐', text: '真聪明！' },
                { emoji: '🌟', text: '答对了！' },
                { emoji: '👏', text: '好厉害！' },
                { emoji: '🏆', text: '完美！' }
            ] : [
                { emoji: '😅', text: '再试试！' },
                { emoji: '💪', text: '加油哦！' },
                { emoji: '📚', text: '继续学习！' }
            ];
            
            const message = messages[Math.floor(Math.random() * messages.length)];
            
            document.getElementById('feedbackEmoji').textContent = message.emoji;
            document.getElementById('feedbackText').textContent = message.text;
            document.getElementById('feedbackMessage').classList.add('show');
            document.getElementById('overlay').classList.add('show');
            
            setTimeout(() => {
                document.getElementById('feedbackMessage').classList.remove('show');
                document.getElementById('overlay').classList.remove('show');
            }, 1500);
        }

        // 更新分数显示
        function updateScoreDisplay() {
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('streak').textContent = gameState.streak;
            
            // 更新星星
            const starsCount = Math.floor(gameState.streak / 3);
            const stars = '⭐'.repeat(Math.min(starsCount, 5));
            document.getElementById('stars').textContent = stars;
            
            saveGameState();
        }

        // 朗读单词
        function speakWord() {
            if (!gameState.currentWord) return;
            
            const utterance = new SpeechSynthesisUtterance(gameState.currentWord.word);
            utterance.lang = 'en-US';
            utterance.rate = 0.8;
            utterance.volume = gameState.volume;
            
            speechSynthesis.speak(utterance);
        }

        // 播放音效
        function playSound(type) {
            // 使用 Web Audio API 生成简单音效
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            gainNode.gain.value = gameState.volume * 0.3;
            
            if (type === 'success') {
                // 成功音效：上升音调
                oscillator.frequency.setValueAtTime(523.25, audioContext.currentTime); // C5
                oscillator.frequency.setValueAtTime(659.25, audioContext.currentTime + 0.1); // E5
                oscillator.frequency.setValueAtTime(783.99, audioContext.currentTime + 0.2); // G5
            } else {
                // 错误音效：下降音调
                oscillator.frequency.setValueAtTime(392.00, audioContext.currentTime); // G4
                oscillator.frequency.setValueAtTime(349.23, audioContext.currentTime + 0.1); // F4
                oscillator.frequency.setValueAtTime(329.63, audioContext.currentTime + 0.2); // E4
            }
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.3);
        }

        // 重置游戏
        function resetGame() {
            gameState.score = 0;
            gameState.streak = 0;
            gameState.totalQuestions = 0;
            updateScoreDisplay();
            startNewRound();
        }

        // 保存游戏状态
        function saveGameState() {
            localStorage.setItem('wordGameState', JSON.stringify(gameState));
        }

        // 加载游戏状态
        function loadGameState() {
            const saved = localStorage.getItem('wordGameState');
            if (saved) {
                const loaded = JSON.parse(saved);
                gameState = { ...gameState, ...loaded };
                updateScoreDisplay();
                
                // 更新类别按钮状态
                setTimeout(() => {
                    document.querySelectorAll('.category-btn').forEach(btn => {
                        const category = Object.keys({
                            'animals': '🐾 动物',
                            'food': '🍔 食物',
                            'family': '👨‍👩‍👧‍👦 家庭',
                            'colors': '🎨 颜色',
                            'body': '👂 身体',
                            'adjectives': '📏 形容词'
                        }).find(key => btn.textContent.includes(key.split(' ')[1]));
                        
                        if (category && gameState.selectedCategories.includes(category)) {
                            btn.classList.add('active');
                        }
                    });
                }, 100);
                
                // 设置音量滑块
                document.getElementById('volumeSlider').value = gameState.volume;
            }
        }
    </script>
</body>
</html>
